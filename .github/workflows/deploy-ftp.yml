name: Deploy to Beget FTP

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.FTP_SERVER }}" || (echo "Missing FTP_SERVER secret" && exit 1)
          test -n "${{ secrets.FTP_USERNAME }}" || (echo "Missing FTP_USERNAME secret" && exit 1)
          test -n "${{ secrets.FTP_PASSWORD }}" || (echo "Missing FTP_PASSWORD secret" && exit 1)
          test -n "${{ secrets.FTP_REMOTE_DIR }}" || (echo "Missing FTP_REMOTE_DIR secret" && exit 1)

      - name: Deploy files via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./
          server-dir: ${{ secrets.FTP_REMOTE_DIR }}
          dangerous-clean-slate: false
          exclude: |
            .git/**
            .github/**
            .ftp-deploy-sync-state.json
            **/.git/**
            **/.github/**
            **/.ftp-deploy-sync-state.json
            **/.idea/**
            **/.vscode/**
            **/node_modules/**
            **/upload/**
            **/bitrix/cache/**
            **/bitrix/managed_cache/**
            **/bitrix/stack_cache/**
            **/bitrix/tmp/**
            **/bitrix/backup/**
            **/bitrix/updates/**
